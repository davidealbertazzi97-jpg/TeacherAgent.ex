# Mimics the production reverse proxy in front of the local eXeLearning
# backend (host port 8080, the default APP_PORT). Faithful to the production nginx vhost:
#   - WebSocket (Yjs) is forwarded at /apps/education/exelearning/yjs/
#   - the app is forwarded at /apps/education/exelearning
#   - EVERYTHING else (including bare "/") returns 502, like prod where the
#     upstream has nothing mounted at root.
#
# Two listeners share the same rules (see exelearning-locations.inc):
#   :80  plain HTTP  -> use http://localhost/... (localhost is a secure context,
#                       so the preview Service Worker registers there).
#   :443 HTTPS       -> use https://domain.local/... (secure context too;
#                       needs the self-signed cert trusted, see README).
#
# The CAS login redirect from production is intentionally omitted so local
# password auth keeps working.

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 0; # no proxy-side body cap; the backend enforces limits
    include /etc/nginx/exelearning-locations.inc;
}

server {
    listen 443 ssl default_server;
    server_name domain.local localhost;
    client_max_body_size 0;

    ssl_certificate     /etc/nginx/certs/domain.local.crt;
    ssl_certificate_key /etc/nginx/certs/domain.local.key;

    include /etc/nginx/exelearning-locations.inc;
}
