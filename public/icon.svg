<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Emblem -->
    <linearGradient id="emblem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Glow Filter for Neural Nodes -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- GRAPHICS EMBLEM (Graduation Cap + AI Agent Circuit) -->
  <g transform="translate(0, 15)">
    <!-- Graduation Cap Neck / Lower Part -->
    <path d="M 78,125 L 78,160 Q 128,190 178,160 L 178,125 Q 128,138 78,125 Z" fill="url(#emblem-grad)" opacity="0.9" />
    
    <!-- Tassel hanging from cap -->
    <path d="M 128,85 Q 183,95 215,135 L 215,170" stroke="#06b6d4" stroke-width="3" fill="none" />
    <circle cx="215" cy="172" r="5" fill="#06b6d4" />
    <path d="M 211,172 L 219,172 L 217,187 L 213,187 Z" fill="#06b6d4" />

    <!-- Cap Top Diamond -->
    <path d="M 128,25 L 238,85 L 128,145 L 18,85 Z" fill="url(#emblem-grad)" />

    <!-- AI Neural Network Circuit Lines (Inside Cap) -->
    <line x1="128" y1="85" x2="92" y2="67" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="128" y1="85" x2="164" y2="67" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="128" y1="85" x2="92" y2="103" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="128" y1="85" x2="164" y2="103" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />

    <!-- AI Neural Network Nodes -->
    <circle cx="128" cy="85" r="9" fill="#ffffff" filter="url(#glow)" />
    <circle cx="128" cy="85" r="5.5" fill="#06b6d4" />
    
    <circle cx="92" cy="67" r="4.5" fill="#ffffff" />
    <circle cx="164" cy="67" r="4.5" fill="#ffffff" />
    <circle cx="92" cy="103" r="4.5" fill="#ffffff" />
    <circle cx="164" cy="103" r="4.5" fill="#ffffff" />
  </g>
</svg>
