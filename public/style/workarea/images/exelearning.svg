<svg viewBox="0 0 350 321" width="350" height="321" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Emblem -->
    <linearGradient id="emblem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Glow Filter for Neural Nodes -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- GRAPHICS EMBLEM (Graduation Cap + AI Agent Circuit) -->
  <g transform="translate(0, 10)">
    <!-- Graduation Cap Neck / Lower Part -->
    <path d="M 120,128 L 120,165 Q 175,195 230,165 L 230,128 Q 175,142 120,128 Z" fill="url(#emblem-grad)" opacity="0.9" />
    
    <!-- Tassel hanging from cap -->
    <path d="M 175,90 Q 235,100 270,140 L 270,175" stroke="#06b6d4" stroke-width="3" fill="none" />
    <circle cx="270" cy="177" r="5" fill="#06b6d4" />
    <path d="M 266,177 L 274,177 L 272,192 L 268,192 Z" fill="#06b6d4" />

    <!-- Cap Top Diamond -->
    <path d="M 175,30 L 295,90 L 175,150 L 55,90 Z" fill="url(#emblem-grad)" />

    <!-- AI Neural Network Circuit Lines (Inside Cap) -->
    <line x1="175" y1="90" x2="135" y2="70" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="175" y1="90" x2="215" y2="70" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="175" y1="90" x2="135" y2="110" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <line x1="175" y1="90" x2="215" y2="110" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />

    <!-- AI Neural Network Nodes -->
    <circle cx="175" cy="90" r="10" fill="#ffffff" filter="url(#glow)" />
    <circle cx="175" cy="90" r="6" fill="#06b6d4" />
    
    <circle cx="135" cy="70" r="5" fill="#ffffff" />
    <circle cx="215" cy="70" r="5" fill="#ffffff" />
    <circle cx="135" cy="110" r="5" fill="#ffffff" />
    <circle cx="215" cy="110" r="5" fill="#ffffff" />
  </g>

  <!-- TYPOGRAPHY SECTION -->
  <g id="typography">
    <!-- TeacherAgent-ex Text -->
    <text x="175" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" letter-spacing="-0.5">
      <tspan fill="#1e293b">Teach</tspan>
      <tspan fill="#4f46e5">Agent</tspan>
      <tspan fill="#06b6d4">-eX</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="175" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#64748b" letter-spacing="2.5">
      AI-POWERED AUTHORING
    </text>
  </g>
</svg>