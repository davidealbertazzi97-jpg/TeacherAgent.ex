<svg viewBox="0 0 350 54" width="350" height="54" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient for the text/logo -->
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Icon Emblem Symbol -->
  <g transform="translate(10, 4)">
    <!-- Cap Top Diamond -->
    <path d="M 22,6 L 40,16 L 22,26 L 4,16 Z" fill="url(#text-grad)" />
    <!-- Cap Neck -->
    <path d="M 14,22 L 14,28 Q 22,33 30,28 L 30,22 Z" fill="url(#text-grad)" opacity="0.9" />
    <!-- AI Neural Network Circuit Nodes -->
    <circle cx="22" cy="16" r="4.5" fill="#ffffff" />
    <circle cx="22" cy="16" r="2.5" fill="#06b6d4" />
    <line x1="22" y1="16" x2="14" y2="12" stroke="#ffffff" stroke-width="1.2" opacity="0.8" />
    <line x1="22" y1="16" x2="30" y2="12" stroke="#ffffff" stroke-width="1.2" opacity="0.8" />
    <circle cx="14" cy="12" r="2" fill="#ffffff" />
    <circle cx="30" cy="12" r="2" fill="#ffffff" />
  </g>

  <!-- Typography -->
  <g transform="translate(60, 38)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5">
      <tspan fill="#1e293b">Teacher</tspan>
      <tspan fill="#4f46e5">Agent</tspan>
      <tspan fill="#06b6d4">-ex</tspan>
    </text>
  </g>
</svg>