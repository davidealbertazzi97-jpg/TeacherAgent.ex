<script>
    (function() {
        var basePath = '';
        var version = '';
        var isStaticMode = false;
        try {
            basePath = (parent && parent.eXeLearning && parent.eXeLearning.config && parent.eXeLearning.config.basePath) || '';
            version = (parent && parent.eXeLearning && parent.eXeLearning.version) || '';
            // Detect static mode - no version prefix needed for static servers (they don't rewrite URLs)
            isStaticMode = parent && parent.__EXE_STATIC_MODE__;
        } catch(e) {}
        var jqueryPath = '/libs/jquery/jquery.min.js';
        // In static mode, don't use version prefix; in online mode, use versioned URL
        var jqueryUrl = isStaticMode ? (basePath + jqueryPath) : (basePath + '/' + version + jqueryPath);
        document.write('<script src="' + jqueryUrl + '"><\/script>');
    })();
</script>
<script type="text/javascript" src="includes/codemirror/codemirror.js"></script>
<script type="text/javascript" src="includes/batched_scripts.js"></script>
<script type="text/javascript" src="includes/i18n.js"></script>
<script type="text/javascript" src="includes/ai-assistant.js"></script>
<script type="text/javascript" src="includes/codemagic.js"></script>

<link rel="stylesheet" href="includes/codemagic.css" />
<link rel="stylesheet" href="includes/codemirror/codemirror.css" />

<div id="body">

	<div id="wrapline">
        <input type="checkbox" name="wraptext" id="wraptext" checked="checked" /> %Wrap_text%
        <input type="checkbox" name="autocompletion" id="autocompletion" checked="checked" /> %Auto_completion%
        <input type="checkbox" name="highlighting" id="highlighting" checked="checked" /> %Highlight_Code%
        <span id="maximizeEditorWrapper"><input type="checkbox" name="maximizeEditor" id="maximizeEditor" /> %Full_Screen%</span>
    </div>
    <div style="clear: both;"></div>

	 <div class="editor-buttons">
        <a id="undo" class="disabled" title="%Undo%"><img src="images/icons/undo.png" alt="%Undo%" /> %Undo%</a>
        <a id="redo" class="disabled" title="%Redo%"><img src="images/icons/redo.png" alt="%Redo%" /> %Redo%</a>
        <a id="search_replace" title="%Search_and_Replace%"><img src="images/icons/lens.png" alt="%Search_and_Replace%" /> %Search_and_Replace%</a>
        <a id="re_beautify" title="%Format_HTML_Code%"><img src="images/icons/file.png" alt="%Format_HTML_Code%" /> %Reformat%</a>
    </div>  
    <div style="clear:both;"></div>
    
    <div id="search_panel">
    	<span id="search_query"><label for="query">%Search%</label>: <input id="query" type="text" class="form-control" /></span>
        <span id="replace_query"><label for="replace">%Replace%</label>: <input id="replace" type="text"  class="form-control" /></span>
        <span id="search_button"><input id="search_code" type="submit" value="%Search%" class="btn-default" /></span>
        <span id="replace_button"><input id="replace_code" type="submit" value="%Replace%" class="btn-default" /></span>
    </div>
    <div style="clear:both;"></div>

    <details id="ai_panel" class="ai-panel">
        <summary>%AI_Assistant%</summary>
        <div class="ai-grid">
            <label for="ai_provider_preset">%Provider_Preset%</label>
            <select id="ai_provider_preset" class="form-control">
                <option value="mistral-codestral">Mistral Codestral</option>
                <option value="openai">OpenAI</option>
                <option value="groq">Groq</option>
                <option value="google-gemini">Google Gemini</option>
                <option value="sambanova">SambaNova</option>
                <option value="ollama">Ollama Local</option>
                <option value="anthropic">Anthropic Compatible</option>
                <option value="openai-compatible">OpenAI Compatible Custom</option>
            </select>
            <label for="ai_provider_type">%Provider%</label>
            <select id="ai_provider_type" class="form-control">
                <option value="openai-compatible">%OpenAI_Compatible%</option>
                <option value="anthropic">%Anthropic%</option>
                <option value="gemini">%Gemini%</option>
            </select>
            <label for="ai_base_url">%Provider_Base_URL%</label>
            <input id="ai_base_url" class="form-control" type="url" placeholder="https://api.openai.com/v1" />
            <label for="ai_model">%Model%</label>
            <input id="ai_model" class="form-control" type="text" placeholder="gpt-4.1-mini" />
            <label for="ai_endpoint_path">%Endpoint_Path%</label>
            <input id="ai_endpoint_path" class="form-control" type="text" placeholder="/chat/completions" />
            <label for="ai_api_key">%API_Key%</label>
            <input id="ai_api_key" class="form-control" type="password" autocomplete="off" />
        </div>
        <label for="ai_prompt">%Describe_the_learning_object%</label>
        <textarea id="ai_prompt" class="form-control ai-prompt" rows="4"></textarea>
        <div class="ai-actions">
            <button id="ai_enhance_prompt" class="btn-default" type="button">%Enhance_Prompt%</button>
            <button id="ai_undo_prompt" class="btn-default" type="button" disabled>%Undo_Prompt%</button>
            <button id="ai_generate_html" class="btn-default" type="button">%Generate_HTML%</button>
            <button id="ai_insert_html" class="btn-primary" type="button" disabled>%Insert_generated_HTML%</button>
            <button id="ai_use_generated_prompt" class="btn-default" type="button" disabled>%Use_HTML_As_Next_Prompt%</button>
            <button id="ai_clear_generated" class="btn-default" type="button" disabled>%Clear_Generated_HTML%</button>
            <button id="ai_clear_source" class="btn-default ai-danger" type="button">%Clear_Source_HTML%</button>
            <button id="ai_clear_chat" class="btn-default" type="button">%Clear_Chat%</button>
            <span id="ai_status" class="ai-status" role="status" aria-live="polite"></span>
        </div>
        <div id="ai_conversation" class="ai-conversation"></div>
        <label for="ai_generated_html">%Generated_HTML%</label>
        <textarea id="ai_generated_html" class="form-control ai-generated" rows="6" readonly></textarea>
    </details>

	<textarea name="htmlSource" id="htmlSource" rows="25" cols="100" class="htmlSource"></textarea>
	
    <div class="mceActionPanel">
        <button id="codemagic_cancel" class="btn-default">%Cancel%</button> <button id="codemagic_insert" class="btn-primary">%Insert_and_Close%</button>
    </div>
</div>
